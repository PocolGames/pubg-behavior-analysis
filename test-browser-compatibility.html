<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>브라우저 호환성 테스트 - PUBG 분석</title>
    <style>
        body {
            font-family: 'Noto Sans KR', Arial, sans-serif;
            margin: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 8px;
        }
        .test-result {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success { background: rgba(40, 167, 69, 0.2); border: 1px solid #28a745; }
        .error { background: rgba(220, 53, 69, 0.2); border: 1px solid #dc3545; }
        .warning { background: rgba(255, 193, 7, 0.2); border: 1px solid #ffc107; }
        .loading { background: rgba(108, 117, 125, 0.2); border: 1px solid #6c757d; }
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #e55a2b; }
        .console-output {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🧪 PUBG 웹사이트 브라우저 호환성 테스트</h1>
        
        <!-- 브라우저 정보 -->
        <div class="test-section">
            <h3>📊 브라우저 환경 정보</h3>
            <div id="browserInfo" class="test-result loading">브라우저 정보 로딩 중...</div>
        </div>

        <!-- CSS 로딩 테스트 -->
        <div class="test-section">
            <h3>🎨 CSS 파일 로딩 테스트</h3>
            <div id="cssTest" class="test-result loading">CSS 파일 테스트 중...</div>
            <button onclick="testCSSLoading()">CSS 재테스트</button>
        </div>

        <!-- JavaScript 기능 테스트 -->
        <div class="test-section">
            <h3>⚡ JavaScript 기능 테스트</h3>
            <div id="jsTest" class="test-result loading">JavaScript 테스트 중...</div>
            <button onclick="testJavaScriptFeatures()">JS 재테스트</button>
        </div>

        <!-- 데이터 로딩 테스트 -->
        <div class="test-section">
            <h3>📁 데이터 파일 로딩 테스트</h3>
            <div id="dataTest" class="test-result loading">데이터 파일 테스트 중...</div>
            <button onclick="testDataLoading()">데이터 재테스트</button>
        </div>

        <!-- Chart.js 테스트 -->
        <div class="test-section">
            <h3>📈 Chart.js 라이브러리 테스트</h3>
            <div id="chartTest" class="test-result loading">Chart.js 테스트 중...</div>
            <canvas id="testChart" width="400" height="200" style="background: rgba(255,255,255,0.1); border-radius: 5px;"></canvas>
            <button onclick="testChartJS()">차트 재테스트</button>
        </div>

        <!-- 반응형 테스트 -->
        <div class="test-section">
            <h3>📱 반응형 디자인 테스트</h3>
            <div id="responsiveTest" class="test-result loading">반응형 테스트 중...</div>
            <button onclick="testResponsive()">반응형 재테스트</button>
        </div>

        <!-- 콘솔 출력 -->
        <div class="test-section">
            <h3>🖥️ 콘솔 출력</h3>
            <div id="consoleOutput" class="console-output">테스트 시작...\n</div>
            <button onclick="clearConsole()">콘솔 지우기</button>
        </div>

        <!-- 전체 테스트 실행 -->
        <div class="test-section" style="text-align: center;">
            <button onclick="runAllTests()" style="font-size: 16px; padding: 15px 30px;">🚀 전체 테스트 실행</button>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <script>
        // 콘솔 출력 함수
        function logToConsole(message, type = 'info') {
            const console_output = document.getElementById('consoleOutput');
            const timestamp = new Date().toLocaleTimeString();
            const colorMap = {
                'info': '#0f0',
                'error': '#f00',
                'warning': '#ff0',
                'success': '#0f0'
            };
            
            console_output.innerHTML += `<span style="color: ${colorMap[type]}">[${timestamp}] ${message}</span>\\n`;
            console_output.scrollTop = console_output.scrollHeight;
            
            // 실제 콘솔에도 출력
            console.log(`[PUBG Test] ${message}`);
        }

        function clearConsole() {
            document.getElementById('consoleOutput').innerHTML = '';
        }

        // 브라우저 정보 수집
        function getBrowserInfo() {
            logToConsole('브라우저 정보 수집 시작...', 'info');
            
            const info = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                cookieEnabled: navigator.cookieEnabled,
                onlineStatus: navigator.onLine,
                screen: {
                    width: screen.width,
                    height: screen.height,
                    colorDepth: screen.colorDepth
                },
                viewport: {
                    width: window.innerWidth,
                    height: window.innerHeight
                },
                localStorage: typeof(Storage) !== "undefined",
                geolocation: "geolocation" in navigator,
                serviceWorker: 'serviceWorker' in navigator
            };

            const browserInfo = document.getElementById('browserInfo');
            browserInfo.className = 'test-result success';
            browserInfo.innerHTML = `
                <strong>브라우저:</strong> ${getBrowserName()}<br>
                <strong>화면 해상도:</strong> ${info.screen.width}x${info.screen.height}<br>
                <strong>뷰포트:</strong> ${info.viewport.width}x${info.viewport.height}<br>
                <strong>언어:</strong> ${info.language}<br>
                <strong>로컬스토리지:</strong> ${info.localStorage ? '✅ 지원' : '❌ 미지원'}<br>
                <strong>서비스워커:</strong> ${info.serviceWorker ? '✅ 지원' : '❌ 미지원'}
            `;
            
            logToConsole('브라우저 정보 수집 완료', 'success');
            return info;
        }

        function getBrowserName() {
            const agent = navigator.userAgent;
            if (agent.indexOf("Chrome") > -1) return "Chrome";
            if (agent.indexOf("Firefox") > -1) return "Firefox";
            if (agent.indexOf("Safari") > -1) return "Safari";
            if (agent.indexOf("Edge") > -1) return "Edge";
            return "Unknown";
        }

        // CSS 로딩 테스트
        async function testCSSLoading() {
            logToConsole('CSS 파일 로딩 테스트 시작...', 'info');
            const cssTest = document.getElementById('cssTest');
            
            try {
                // CSS 파일들 테스트
                const cssFiles = [
                    'css/main.css',
                    'css/dashboard.css', 
                    'css/components.css'
                ];
                
                let results = [];
                
                for (let cssFile of cssFiles) {
                    try {
                        const response = await fetch(cssFile);
                        if (response.ok) {
                            results.push(`✅ ${cssFile}: 로딩 성공`);
                            logToConsole(`CSS 파일 ${cssFile} 로딩 성공`, 'success');
                        } else {
                            results.push(`❌ ${cssFile}: ${response.status} 오류`);
                            logToConsole(`CSS 파일 ${cssFile} 로딩 실패: ${response.status}`, 'error');
                        }
                    } catch (error) {
                        results.push(`❌ ${cssFile}: 로딩 실패`);
                        logToConsole(`CSS 파일 ${cssFile} 오류: ${error.message}`, 'error');
                    }
                }
                
                const allSuccess = results.every(r => r.includes('✅'));
                cssTest.className = `test-result ${allSuccess ? 'success' : 'error'}`;
                cssTest.innerHTML = results.join('<br>');
                
            } catch (error) {
                cssTest.className = 'test-result error';
                cssTest.innerHTML = `❌ CSS 테스트 실패: ${error.message}`;
                logToConsole(`CSS 테스트 오류: ${error.message}`, 'error');
            }
        }

        // JavaScript 기능 테스트
        function testJavaScriptFeatures() {
            logToConsole('JavaScript 기능 테스트 시작...', 'info');
            const jsTest = document.getElementById('jsTest');
            
            const tests = [
                { name: 'ES6 화살표 함수', test: () => { const f = () => true; return f(); } },
                { name: 'const/let 변수', test: () => { const a = 1; let b = 2; return a === 1 && b === 2; } },
                { name: 'Template Literals', test: () => { const name = 'test'; return `Hello ${name}` === 'Hello test'; } },
                { name: 'Promise', test: () => typeof Promise !== 'undefined' },
                { name: 'Async/Await', test: () => { try { eval('async function test() { await 1; }'); return true; } catch { return false; } } },
                { name: 'Fetch API', test: () => typeof fetch !== 'undefined' },
                { name: 'IntersectionObserver', test: () => typeof IntersectionObserver !== 'undefined' },
                { name: 'Map/Set', test: () => typeof Map !== 'undefined' && typeof Set !== 'undefined' }
            ];
            
            let results = [];
            let allPassed = true;
            
            tests.forEach(test => {
                try {
                    const result = test.test();
                    if (result) {
                        results.push(`✅ ${test.name}: 지원됨`);
                        logToConsole(`JS 기능 ${test.name}: 지원됨`, 'success');
                    } else {
                        results.push(`❌ ${test.name}: 미지원`);
                        logToConsole(`JS 기능 ${test.name}: 미지원`, 'warning');
                        allPassed = false;
                    }
                } catch (error) {
                    results.push(`❌ ${test.name}: 오류`);
                    logToConsole(`JS 기능 ${test.name}: 오류 - ${error.message}`, 'error');
                    allPassed = false;
                }
            });
            
            jsTest.className = `test-result ${allPassed ? 'success' : 'warning'}`;
            jsTest.innerHTML = results.join('<br>');
        }

        // 데이터 로딩 테스트
        async function testDataLoading() {
            logToConsole('데이터 파일 로딩 테스트 시작...', 'info');
            const dataTest = document.getElementById('dataTest');
            
            const dataFiles = [
                'data/cluster-data.json',
                'data/model-performance.json',
                'data/player-prediction.json'
            ];
            
            let results = [];
            
            for (let dataFile of dataFiles) {
                try {
                    const response = await fetch(dataFile);
                    if (response.ok) {
                        const data = await response.json();
                        results.push(`✅ ${dataFile}: 로딩 성공 (${Object.keys(data).length}개 키)`);
                        logToConsole(`데이터 파일 ${dataFile} 로딩 성공`, 'success');
                    } else {
                        results.push(`❌ ${dataFile}: HTTP ${response.status}`);
                        logToConsole(`데이터 파일 ${dataFile} HTTP 오류: ${response.status}`, 'error');
                    }
                } catch (error) {
                    results.push(`❌ ${dataFile}: ${error.message}`);
                    logToConsole(`데이터 파일 ${dataFile} 오류: ${error.message}`, 'error');
                }
            }
            
            const allSuccess = results.every(r => r.includes('✅'));
            dataTest.className = `test-result ${allSuccess ? 'success' : 'error'}`;
            dataTest.innerHTML = results.join('<br>');
        }

        // Chart.js 테스트
        function testChartJS() {
            logToConsole('Chart.js 라이브러리 테스트 시작...', 'info');
            const chartTest = document.getElementById('chartTest');
            
            try {
                if (typeof Chart === 'undefined') {
                    throw new Error('Chart.js 라이브러리가 로드되지 않았습니다');
                }
                
                const ctx = document.getElementById('testChart');
                const chart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Survivor', 'Explorer', 'Aggressive'],
                        datasets: [{
                            label: '플레이어 비율',
                            data: [49.4, 50.5, 0.1],
                            backgroundColor: ['#56ab2f', '#667eea', '#dc3545'],
                            borderColor: ['#56ab2f', '#667eea', '#dc3545'],
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: { display: true },
                            title: { display: true, text: 'PUBG 플레이어 유형 분포' }
                        },
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
                
                chartTest.className = 'test-result success';
                chartTest.innerHTML = `✅ Chart.js 테스트 성공<br>차트 버전: ${Chart.version}`;
                logToConsole(`Chart.js 테스트 성공 (버전: ${Chart.version})`, 'success');
                
            } catch (error) {
                chartTest.className = 'test-result error';
                chartTest.innerHTML = `❌ Chart.js 테스트 실패: ${error.message}`;
                logToConsole(`Chart.js 테스트 실패: ${error.message}`, 'error');
            }
        }

        // 반응형 테스트
        function testResponsive() {
            logToConsole('반응형 디자인 테스트 시작...', 'info');
            const responsiveTest = document.getElementById('responsiveTest');
            
            const breakpoints = [
                { name: 'Mobile', width: 480 },
                { name: 'Tablet', width: 768 },
                { name: 'Desktop', width: 1024 }
            ];
            
            const currentWidth = window.innerWidth;
            let deviceType = 'Unknown';
            
            if (currentWidth <= 480) deviceType = 'Mobile';
            else if (currentWidth <= 768) deviceType = 'Tablet';
            else if (currentWidth <= 1024) deviceType = 'Small Desktop';
            else deviceType = 'Desktop';
            
            const supportsMediaQueries = window.matchMedia && window.matchMedia('(min-width: 768px)').matches;
            const supportsFlexbox = CSS.supports('display', 'flex');
            const supportsGrid = CSS.supports('display', 'grid');
            
            responsiveTest.className = 'test-result success';
            responsiveTest.innerHTML = `
                <strong>현재 기기:</strong> ${deviceType} (${currentWidth}px)<br>
                <strong>Media Queries:</strong> ${supportsMediaQueries ? '✅ 지원' : '❌ 미지원'}<br>
                <strong>Flexbox:</strong> ${supportsFlexbox ? '✅ 지원' : '❌ 미지원'}<br>
                <strong>CSS Grid:</strong> ${supportsGrid ? '✅ 지원' : '❌ 미지원'}
            `;
            
            logToConsole(`반응형 테스트 완료 - 현재 기기: ${deviceType}`, 'success');
        }

        // 전체 테스트 실행
        async function runAllTests() {
            logToConsole('='.repeat(50), 'info');
            logToConsole('전체 테스트 시작', 'info');
            logToConsole('='.repeat(50), 'info');
            
            // 순차적으로 모든 테스트 실행
            getBrowserInfo();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testCSSLoading();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            testJavaScriptFeatures();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testDataLoading();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            testChartJS();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            testResponsive();
            
            logToConsole('='.repeat(50), 'info');
            logToConsole('전체 테스트 완료!', 'success');
            logToConsole('='.repeat(50), 'info');
        }

        // 페이지 로드 시 초기 테스트 실행
        window.addEventListener('load', function() {
            setTimeout(runAllTests, 1000);
        });

        // 오류 캐치
        window.addEventListener('error', function(e) {
            logToConsole(`글로벌 오류 발생: ${e.error.message} (${e.filename}:${e.lineno})`, 'error');
        });

        // Promise 거부 캐치
        window.addEventListener('unhandledrejection', function(e) {
            logToConsole(`Promise 거부: ${e.reason}`, 'error');
        });
    </script>
</body>
</html>
